<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>비정상 추적 iframe 복구 기사</title>
</head>
<body>
  <noscript><iframe src="https://tracking.example.test/ns.html" height="0" width="0"></noscript>
  <h1>관광객 수보다 체류와 소비가 중요</h1>
  <div id="newsViewArea" class="detail" itemprop="articleBody">
    <figure>
      <img src="https://images.example.test/tourism-chart.png" alt="방한 관광객 및 관광수입 추이">
      <figcaption>자료: 한국관광공사, 단위: 만 명·억 달러</figcaption>
    </figure>
    <p>국내 관광 산업은 방문객 수가 늘었지만 체류 기간과 소비 측면의 회복은 제한적이라는 분석입니다.</p>
    <p>성과 관리 기준을 숙박 일수와 일인당 소비액 등 질적 지표로 확대할 필요가 있다고 제언했습니다.</p>
    <p>[홍길동 디지털뉴스부 기자 reporter@example.test]</p>
  </div>
</body>
</html>
